services:
  findata-mcp:
    image: ghcr.io/lakshya-aga/data-mcp:latest
    ports:
      - "8000:8000"
    volumes:
      # Option 2: mount host auth (login once on your machine, no OAuth prompts in container)
      - ~/.codex:/root/.codex:ro
      - ~/.claude:/root/.claude:ro
      # Mount local server.py so edits take effect without rebuilding
      - ./findata_mcp/server.py:/app/findata_mcp/server.py:ro
      # Writable overlay for Codex-generated files and SP500 git clone
      - findata-app:/app/findata
      - findata-data:/app/data
    environment:
      FRED_API_KEY: ""
      # OPENAI_API_KEY: sk-...
      # ANTHROPIC_API_KEY: sk-ant-...
    restart: unless-stopped

volumes:
  findata-app:
  findata-data:
